<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-cl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="50%" style="stop-color:#2d5a8e"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <filter id="blur-cl"><feGaussianBlur stdDeviation="40"/></filter>
    <pattern id="grid-cl" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="white" stroke-width="0.3" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-cl)"/>
  <rect width="1200" height="630" fill="url(#grid-cl)"/>
  <ellipse cx="600" cy="150" rx="350" ry="150" fill="white" opacity="0.03" filter="url(#blur-cl)"/>
  <!-- Main cloud -->
  <path d="M400 180 Q430 100 520 120 Q550 60 630 90 Q680 50 740 90 Q800 60 830 120 Q900 100 890 170 Q920 200 880 220 L380 220 Q340 200 360 180 Q340 150 400 180Z" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
  <path d="M400 180 Q430 100 520 120 Q550 60 630 90 Q680 50 740 90 Q800 60 830 120 Q900 100 890 170 Q920 200 880 220 L380 220 Q340 200 360 180 Q340 150 400 180Z" fill="white" opacity="0.04"/>
  <!-- Connection lines from cloud -->
  <line x1="480" y1="220" x2="280" y2="340" stroke="#e8913a" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
  <line x1="600" y1="220" x2="600" y2="340" stroke="#2ecc71" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
  <line x1="720" y1="220" x2="920" y2="340" stroke="#e8913a" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
  <!-- AZ 1 -->
  <g transform="translate(160,330)">
    <rect x="0" y="0" width="240" height="180" rx="12" fill="none" stroke="white" stroke-width="1" opacity="0.15" stroke-dasharray="4,4"/>
    <text x="120" y="25" font-family="Inter,sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.35">Availability Zone A</text>
    <!-- Container -->
    <rect x="20" y="45" width="90" height="55" rx="6" fill="none" stroke="#2ecc71" stroke-width="1.5" opacity="0.6"/>
    <rect x="30" y="55" width="15" height="12" rx="2" fill="#2ecc71" opacity="0.3"/>
    <rect x="50" y="55" width="15" height="12" rx="2" fill="#2ecc71" opacity="0.3"/>
    <rect x="70" y="55" width="15" height="12" rx="2" fill="#2ecc71" opacity="0.2"/>
    <text x="65" y="88" font-family="Inter,sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.5">Containers</text>
    <!-- Server -->
    <rect x="130" y="45" width="90" height="55" rx="6" fill="none" stroke="#e8913a" stroke-width="1.5" opacity="0.6"/>
    <line x1="140" y1="65" x2="210" y2="65" stroke="#e8913a" stroke-width="0.5" opacity="0.3"/>
    <line x1="140" y1="75" x2="210" y2="75" stroke="#e8913a" stroke-width="0.5" opacity="0.3"/>
    <circle cx="200" cy="58" r="3" fill="#2ecc71" opacity="0.6"/>
    <text x="175" y="88" font-family="Inter,sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.5">Compute</text>
    <!-- DB -->
    <g transform="translate(60,115)">
      <ellipse cx="60" cy="8" rx="40" ry="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
      <path d="M 20 8 L 20 40 C 20 48, 100 48, 100 40 L 100 8" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
      <text x="60" y="55" font-family="Inter,sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.5">Database</text>
    </g>
  </g>
  <!-- AZ 2 (center) -->
  <g transform="translate(480,330)">
    <rect x="0" y="0" width="240" height="180" rx="12" fill="none" stroke="white" stroke-width="1" opacity="0.15" stroke-dasharray="4,4"/>
    <text x="120" y="25" font-family="Inter,sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.35">Availability Zone B</text>
    <rect x="20" y="45" width="90" height="55" rx="6" fill="none" stroke="#2ecc71" stroke-width="1.5" opacity="0.6"/>
    <rect x="30" y="55" width="15" height="12" rx="2" fill="#2ecc71" opacity="0.3"/>
    <rect x="50" y="55" width="15" height="12" rx="2" fill="#2ecc71" opacity="0.3"/>
    <rect x="70" y="55" width="15" height="12" rx="2" fill="#2ecc71" opacity="0.2"/>
    <text x="65" y="88" font-family="Inter,sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.5">Containers</text>
    <rect x="130" y="45" width="90" height="55" rx="6" fill="none" stroke="#e8913a" stroke-width="1.5" opacity="0.6"/>
    <circle cx="200" cy="58" r="3" fill="#2ecc71" opacity="0.6"/>
    <text x="175" y="88" font-family="Inter,sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.5">Compute</text>
    <g transform="translate(60,115)">
      <ellipse cx="60" cy="8" rx="40" ry="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
      <path d="M 20 8 L 20 40 C 20 48, 100 48, 100 40 L 100 8" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
      <text x="60" y="55" font-family="Inter,sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.5">Database</text>
    </g>
  </g>
  <!-- AZ 3 -->
  <g transform="translate(800,330)">
    <rect x="0" y="0" width="240" height="180" rx="12" fill="none" stroke="white" stroke-width="1" opacity="0.15" stroke-dasharray="4,4"/>
    <text x="120" y="25" font-family="Inter,sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.35">Availability Zone C</text>
    <rect x="20" y="45" width="90" height="55" rx="6" fill="none" stroke="#2ecc71" stroke-width="1.5" opacity="0.6"/>
    <rect x="30" y="55" width="15" height="12" rx="2" fill="#2ecc71" opacity="0.3"/>
    <rect x="50" y="55" width="15" height="12" rx="2" fill="#2ecc71" opacity="0.3"/>
    <text x="65" y="88" font-family="Inter,sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.5">Containers</text>
    <rect x="130" y="45" width="90" height="55" rx="6" fill="none" stroke="#e8913a" stroke-width="1.5" opacity="0.6"/>
    <circle cx="200" cy="58" r="3" fill="#e8913a" opacity="0.6"/>
    <text x="175" y="88" font-family="Inter,sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.5">Standby</text>
    <g transform="translate(60,115)">
      <ellipse cx="60" cy="8" rx="40" ry="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
      <path d="M 20 8 L 20 40 C 20 48, 100 48, 100 40 L 100 8" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
      <text x="60" y="55" font-family="Inter,sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.5">Replica</text>
    </g>
  </g>
  <!-- Cross-AZ connections -->
  <line x1="400" y1="430" x2="480" y2="430" stroke="white" stroke-width="1" stroke-dasharray="3,3" opacity="0.2"/>
  <line x1="720" y1="430" x2="800" y2="430" stroke="white" stroke-width="1" stroke-dasharray="3,3" opacity="0.2"/>
  <text x="600" y="590" font-family="Inter,sans-serif" font-size="28" fill="white" text-anchor="middle" font-weight="700" letter-spacing="0.5">Cloud Architecture Best Practices</text>
</svg>