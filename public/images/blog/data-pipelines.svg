<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-dp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f33"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="glow-dp" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8913a;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="blur-dp"><feGaussianBlur stdDeviation="40"/></filter>
    <pattern id="grid-dp" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-dp)"/>
  <rect width="1200" height="630" fill="url(#grid-dp)"/>
  <!-- Ambient glow -->
  <ellipse cx="300" cy="315" rx="200" ry="150" fill="#e8913a" opacity="0.08" filter="url(#blur-dp)"/>
  <ellipse cx="900" cy="315" rx="200" ry="150" fill="#2ecc71" opacity="0.08" filter="url(#blur-dp)"/>
  <!-- Pipeline flow line -->
  <path d="M 200 315 C 400 315, 400 200, 600 200 C 800 200, 800 315, 1000 315" fill="none" stroke="url(#glow-dp)" stroke-width="3" stroke-dasharray="12,6" opacity="0.6"/>
  <path d="M 200 315 C 400 315, 400 430, 600 430 C 800 430, 800 315, 1000 315" fill="none" stroke="url(#glow-dp)" stroke-width="3" stroke-dasharray="12,6" opacity="0.4"/>
  <!-- Source: Database -->
  <g transform="translate(140,260)">
    <ellipse cx="60" cy="15" rx="45" ry="15" fill="none" stroke="#e8913a" stroke-width="2"/>
    <path d="M 15 15 L 15 95 C 15 105, 105 105, 105 95 L 105 15" fill="none" stroke="#e8913a" stroke-width="2"/>
    <ellipse cx="60" cy="95" rx="45" ry="10" fill="none" stroke="#e8913a" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="60" cy="55" rx="45" ry="10" fill="none" stroke="#e8913a" stroke-width="1" opacity="0.3"/>
    <text x="60" y="130" font-family="Inter,sans-serif" font-size="13" fill="white" text-anchor="middle" opacity="0.6">Sources</text>
  </g>
  <!-- Transform: Gear nodes -->
  <g transform="translate(520,160)">
    <circle cx="80" cy="40" r="35" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
    <circle cx="80" cy="40" r="12" fill="#e8913a" opacity="0.3"/>
    <path d="M 80 10 L 80 5 M 80 70 L 80 75 M 50 40 L 45 40 M 110 40 L 115 40 M 58 18 L 54 14 M 102 62 L 106 66 M 102 18 L 106 14 M 58 62 L 54 66" stroke="white" stroke-width="2" opacity="0.4"/>
    <text x="80" y="95" font-family="Inter,sans-serif" font-size="13" fill="white" text-anchor="middle" opacity="0.6">Transform</text>
  </g>
  <g transform="translate(520,350)">
    <circle cx="80" cy="40" r="35" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
    <circle cx="80" cy="40" r="12" fill="#2ecc71" opacity="0.3"/>
    <path d="M 80 10 L 80 5 M 80 70 L 80 75 M 50 40 L 45 40 M 110 40 L 115 40" stroke="white" stroke-width="2" opacity="0.3"/>
    <text x="80" y="95" font-family="Inter,sans-serif" font-size="13" fill="white" text-anchor="middle" opacity="0.6">Enrich</text>
  </g>
  <!-- Destination: Dashboard -->
  <g transform="translate(920,260)">
    <rect x="0" y="0" width="120" height="80" rx="8" fill="none" stroke="#2ecc71" stroke-width="2"/>
    <line x1="0" y1="25" x2="120" y2="25" stroke="#2ecc71" stroke-width="1" opacity="0.4"/>
    <rect x="12" y="35" width="25" height="35" rx="3" fill="#2ecc71" opacity="0.2"/>
    <rect x="47" y="45" width="25" height="25" rx="3" fill="#e8913a" opacity="0.2"/>
    <rect x="82" y="30" width="25" height="40" rx="3" fill="#2ecc71" opacity="0.15"/>
    <circle cx="15" cy="13" r="4" fill="#2ecc71" opacity="0.5"/>
    <circle cx="28" cy="13" r="4" fill="#e8913a" opacity="0.5"/>
    <circle cx="41" cy="13" r="4" fill="white" opacity="0.2"/>
    <text x="60" y="105" font-family="Inter,sans-serif" font-size="13" fill="white" text-anchor="middle" opacity="0.6">Analytics</text>
  </g>
  <!-- Flow particles -->
  <circle cx="350" cy="290" r="4" fill="#e8913a" opacity="0.7"><animate attributeName="cx" values="250;500;750;950" dur="4s" repeatCount="indefinite"/><animate attributeName="cy" values="315;230;230;315" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="350" cy="340" r="3" fill="#2ecc71" opacity="0.5"><animate attributeName="cx" values="250;500;750;950" dur="5s" repeatCount="indefinite"/><animate attributeName="cy" values="315;400;400;315" dur="5s" repeatCount="indefinite"/></circle>
  <!-- Title -->
  <text x="600" y="580" font-family="Inter,sans-serif" font-size="28" fill="white" text-anchor="middle" font-weight="700" letter-spacing="0.5">Building Modern Data Pipelines</text>
</svg>