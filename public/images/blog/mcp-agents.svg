<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgMcp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f33"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bgMcp)"/>

  <!-- Central MCP Hub -->
  <circle cx="400" cy="200" r="50" fill="none" stroke="#e8913a" stroke-width="3"/>
  <text x="400" y="205" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e8913a" text-anchor="middle" font-weight="700">MCP</text>

  <!-- Agent nodes -->
  <circle cx="200" cy="120" r="30" fill="none" stroke="#2ecc71" stroke-width="2"/>
  <text x="200" y="125" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#2ecc71" text-anchor="middle">Agent 1</text>

  <circle cx="600" cy="120" r="30" fill="none" stroke="#2ecc71" stroke-width="2"/>
  <text x="600" y="125" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#2ecc71" text-anchor="middle">Agent 2</text>

  <circle cx="200" cy="280" r="30" fill="none" stroke="#2ecc71" stroke-width="2"/>
  <text x="200" y="285" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#2ecc71" text-anchor="middle">Agent 3</text>

  <circle cx="600" cy="280" r="30" fill="none" stroke="#2ecc71" stroke-width="2"/>
  <text x="600" y="285" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#2ecc71" text-anchor="middle">Agent 4</text>

  <!-- System nodes -->
  <rect x="80" y="185" width="60" height="30" rx="6" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <text x="110" y="204" font-family="Inter, system-ui, sans-serif" font-size="8" fill="white" text-anchor="middle" opacity="0.7">CRM</text>

  <rect x="660" y="185" width="60" height="30" rx="6" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <text x="690" y="204" font-family="Inter, system-ui, sans-serif" font-size="8" fill="white" text-anchor="middle" opacity="0.7">ERP</text>

  <rect x="370" y="50" width="60" height="30" rx="6" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <text x="400" y="69" font-family="Inter, system-ui, sans-serif" font-size="8" fill="white" text-anchor="middle" opacity="0.7">Database</text>

  <rect x="370" y="320" width="60" height="30" rx="6" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <text x="400" y="339" font-family="Inter, system-ui, sans-serif" font-size="8" fill="white" text-anchor="middle" opacity="0.7">API</text>

  <!-- Connection lines -->
  <line x1="230" y1="130" x2="350" y2="190" stroke="#2ecc71" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="570" y1="130" x2="450" y2="190" stroke="#2ecc71" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="230" y1="270" x2="350" y2="210" stroke="#2ecc71" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="570" y1="270" x2="450" y2="210" stroke="#2ecc71" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>

  <line x1="140" y1="200" x2="350" y2="200" stroke="white" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>
  <line x1="660" y1="200" x2="450" y2="200" stroke="white" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>
  <line x1="400" y1="80" x2="400" y2="150" stroke="white" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>
  <line x1="400" y1="320" x2="400" y2="250" stroke="white" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>

  <text x="400" y="405" font-family="Inter, system-ui, sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="600">MCP: Enabling Enterprise AI Agents</text>
</svg>
