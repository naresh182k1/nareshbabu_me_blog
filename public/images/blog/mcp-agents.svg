<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-mcp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f33"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <filter id="blur-mcp"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="glow-mcp"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid-mcp" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.5" fill="white" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-mcp)"/>
  <rect width="1200" height="630" fill="url(#grid-mcp)"/>
  <ellipse cx="600" cy="300" rx="250" ry="200" fill="#e8913a" opacity="0.05" filter="url(#blur-mcp)"/>
  <!-- Central MCP Hub -->
  <g transform="translate(525,225)" filter="url(#glow-mcp)">
    <rect x="0" y="0" width="150" height="150" rx="20" fill="none" stroke="#e8913a" stroke-width="3"/>
    <rect x="10" y="10" width="130" height="130" rx="15" fill="#e8913a" opacity="0.08"/>
    <text x="75" y="68" font-family="Inter,sans-serif" font-size="28" fill="#e8913a" text-anchor="middle" font-weight="800">MCP</text>
    <text x="75" y="92" font-family="Inter,sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.5">Model Context</text>
    <text x="75" y="106" font-family="Inter,sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.5">Protocol</text>
  </g>
  <!-- AI Agents (left side) -->
  <text x="180" y="120" font-family="Inter,sans-serif" font-size="14" fill="white" text-anchor="middle" opacity="0.4" font-weight="600">AI AGENTS</text>
  <g filter="url(#glow-mcp)">
    <circle cx="180" cy="180" r="28" fill="none" stroke="#2ecc71" stroke-width="2"/>
    <text x="180" y="185" font-family="Inter,sans-serif" font-size="10" fill="#2ecc71" text-anchor="middle">Agent 1</text>
    <circle cx="120" cy="300" r="28" fill="none" stroke="#2ecc71" stroke-width="2"/>
    <text x="120" y="305" font-family="Inter,sans-serif" font-size="10" fill="#2ecc71" text-anchor="middle">Agent 2</text>
    <circle cx="180" cy="420" r="28" fill="none" stroke="#2ecc71" stroke-width="2"/>
    <text x="180" y="425" font-family="Inter,sans-serif" font-size="10" fill="#2ecc71" text-anchor="middle">Agent 3</text>
  </g>
  <!-- Connection lines: Agents to MCP -->
  <g stroke="#2ecc71" stroke-width="1.5" opacity="0.3">
    <line x1="208" y1="190" x2="525" y2="280" stroke-dasharray="8,4"/>
    <line x1="148" y1="300" x2="525" y2="300" stroke-dasharray="8,4"/>
    <line x1="208" y1="410" x2="525" y2="340" stroke-dasharray="8,4"/>
  </g>
  <!-- Protocol arrows -->
  <g fill="#2ecc71" opacity="0.5">
    <polygon points="365,285 355,280 355,290"/>
    <polygon points="365,300 355,295 355,305"/>
    <polygon points="365,340 355,335 355,345"/>
  </g>
  <!-- Systems/Tools (right side) -->
  <text x="1020" y="120" font-family="Inter,sans-serif" font-size="14" fill="white" text-anchor="middle" opacity="0.4" font-weight="600">SYSTEMS &amp; TOOLS</text>
  <g>
    <rect x="960" y="155" width="120" height="50" rx="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <text x="1020" y="185" font-family="Inter,sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.6">CRM / Salesforce</text>
    <rect x="960" y="225" width="120" height="50" rx="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <text x="1020" y="255" font-family="Inter,sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.6">Database</text>
    <rect x="960" y="295" width="120" height="50" rx="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <text x="1020" y="325" font-family="Inter,sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.6">REST APIs</text>
    <rect x="960" y="365" width="120" height="50" rx="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <text x="1020" y="395" font-family="Inter,sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.6">Slack / Teams</text>
    <rect x="960" y="435" width="120" height="50" rx="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <text x="1020" y="465" font-family="Inter,sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.6">ERP / SAP</text>
  </g>
  <!-- Connection lines: MCP to Systems -->
  <g stroke="white" stroke-width="1.5" opacity="0.2">
    <line x1="675" y1="270" x2="960" y2="180" stroke-dasharray="8,4"/>
    <line x1="675" y1="285" x2="960" y2="250" stroke-dasharray="8,4"/>
    <line x1="675" y1="300" x2="960" y2="320" stroke-dasharray="8,4"/>
    <line x1="675" y1="330" x2="960" y2="390" stroke-dasharray="8,4"/>
    <line x1="675" y1="345" x2="960" y2="460" stroke-dasharray="8,4"/>
  </g>
  <!-- Protocol arrows right -->
  <g fill="white" opacity="0.3">
    <polygon points="830,230 820,225 820,235"/>
    <polygon points="830,270 820,265 820,275"/>
    <polygon points="830,310 820,305 820,315"/>
    <polygon points="830,370 820,365 820,375"/>
  </g>
  <!-- Governance shield -->
  <g transform="translate(555,440)" opacity="0.3">
    <path d="M45 0 L85 15 L85 50 C85 75 45 95 45 95 C45 95 5 75 5 50 L5 15 Z" fill="none" stroke="white" stroke-width="1.5"/>
    <text x="45" y="55" font-family="Inter,sans-serif" font-size="10" fill="white" text-anchor="middle" opacity="0.8">Gov</text>
  </g>
  <text x="600" y="590" font-family="Inter,sans-serif" font-size="28" fill="white" text-anchor="middle" font-weight="700" letter-spacing="0.5">MCP: Enabling Enterprise AI Agents</text>
</svg>